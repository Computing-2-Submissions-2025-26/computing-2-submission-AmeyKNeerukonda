<!doctype html>
<html lang="en-gb">
    <head>
        <meta charset="utf-8">
        <title>Tanks - Computing 2</title>
        <link rel="stylesheet" href="default.css">
        <script type="module" src="main.js"></script> 
    </head>
<body>
    <div id="game-container">
        
        <div id="menu-layer">
            <h1 class="menu-title">TANKS</h1>
            <div class="menu-settings">
                <div class="player-settings">
                    <h3>Player 1</h3>
                    <input type="text" id="p1-name-input" value="Player 1">
                    <div class="color-grid" id="p1-colors"></div>
                </div>
                <div class="player-settings">
                    <h3>Player 2</h3>
                    <input type="text" id="p2-name-input" value="Player 2">
                    <div class="color-grid" id="p2-colors"></div>
                </div>
            </div>
            <button id="start-game-btn" class="btn">Start Game</button>
        </div>

        <div id="ui-layer">
            <div class="health-wrapper left">
                <div class="health-container">
                    <div id="p1-health-bar" class="health-bar"></div>
                </div>
                <div id="p1-name-display" class="player-name">Player 1</div>
            </div>
            <div class="health-wrapper right">
                <div class="health-container">
                    <div id="p2-health-bar" class="health-bar"></div>
                </div>
                <div id="p2-name-display" class="player-name">Player 2</div>
            </div>
            
            <div id="game-over-controls">
                <button id="play-again-btn" class="btn">Play Again</button>
                <button id="return-menu-btn" class="btn">Return to Menu</button>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>
    </div>
</body>
</html>
